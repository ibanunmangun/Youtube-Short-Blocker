<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 220px;
      padding: 15px;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f9f9f9;
    }
    .container {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }
    .toggle-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .label-group {
      display: flex;
      flex-direction: column;
    }
    .status-text {
      font-size: 14px;
      font-weight: 600;
      color: #333;
    }
    .sub-text {
      font-size: 11px;
      color: #666;
    }
    .switch {
      position: relative;
      display: inline-block;
      width: 44px;
      height: 24px;
      flex-shrink: 0;
    }
    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #ccc;
      transition: .3s;
      border-radius: 24px;
    }
    .slider:before {
      position: absolute;
      content: "";
      height: 18px;
      width: 18px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: .3s;
      border-radius: 50%;
    }
    input:checked + .slider {
      background-color: #f00;
    }
    input:checked + .slider:before {
      transform: translateX(20px);
    }
    hr {
      border: 0;
      border-top: 1px solid #ddd;
      margin: 5px 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="toggle-row">
      <div class="label-group">
        <span class="status-text">Block Shorts</span>
        <span class="sub-text">Hides all Shorts content</span>
      </div>
      <label class="switch">
        <input type="checkbox" id="toggleShorts" checked>
        <span class="slider"></span>
      </label>
    </div>
    
    <hr>
    
    <div class="toggle-row">
      <div class="label-group">
        <span class="status-text">Focus Mode</span>
        <span class="sub-text">Hides recommendations</span>
      </div>
      <label class="switch">
        <input type="checkbox" id="toggleRecs">
        <span class="slider"></span>
      </label>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
